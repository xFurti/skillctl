name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version already prepared in the repository
        required: true
        type: string
      publish:
        description: Publish packages, tag, and create the GitHub Release
        required: true
        default: false
        type: boolean
      dist_tag:
        description: Optional npm dist-tag override (defaults to latest, or next for prereleases)
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  check-and-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Verify requested version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; if (pkg.version !== process.env.RELEASE_VERSION) throw new Error('Requested version does not match package.json');"
          if git ls-remote --exit-code --tags origin "refs/tags/v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$RELEASE_VERSION already exists" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: node scripts/release-check.mjs
      - uses: actions/upload-artifact@v7
        with:
          name: leogriel-${{ inputs.version }}-packages
          path: artifacts/${{ inputs.version }}/*.tgz
          if-no-files-found: error

  pre-publish-smoke:
    needs: check-and-pack
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        node-version: ['22.13', '24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - uses: actions/download-artifact@v8
        with:
          name: leogriel-${{ inputs.version }}-packages
          path: artifacts/${{ inputs.version }}
      - run: node scripts/smoke-package.mjs "${{ inputs.version }}" --source tarballs

  publish:
    if: ${{ inputs.publish }}
    needs: [check-and-pack, pre-publish-smoke]
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Require the main branch
        if: ${{ github.ref != 'refs/heads/main' }}
        run: exit 1
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v8
        with:
          name: leogriel-${{ inputs.version }}-packages
          path: artifacts/${{ inputs.version }}
      - name: Publish or verify packages in dependency order
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          args=("${{ inputs.version }}")
          if [ -n "$DIST_TAG" ]; then args+=(--tag "$DIST_TAG"); fi
          node scripts/publish-release.mjs "${args[@]}"

  post-publish-smoke:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        node-version: ['22.13', '24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - run: node scripts/smoke-package.mjs "${{ inputs.version }}" --source registry

  tag-and-release:
    needs: [check-and-pack, post-publish-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: leogriel-${{ inputs.version }}-packages
          path: artifacts/${{ inputs.version }}
      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          previous_tag="$(git describe --tags --abbrev=0)"
          node scripts/extract-release-notes.mjs "$VERSION" "${previous_tag#v}" > release-notes.md
          git tag -a "v$VERSION" -m "Leogriel v$VERSION"
          git push origin "v$VERSION"
          release_flags=()
          if [[ "$VERSION" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "v$VERSION" "artifacts/$VERSION"/*.tgz --title "Leogriel v$VERSION" --notes-file release-notes.md --verify-tag "${release_flags[@]}"
