name: CI

on:
  push:
    branches: [main, 'execute-plan/*']
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm -r lint

      - name: Test
        run: pnpm test

      - name: Verify CLI
        run: node packages/cli/bin/skillctl.js --version

      - name: Functional smoke
        shell: bash
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/skillctl-smoke"
          mkdir -p "$WORK/.ci-skill"
          cd "$WORK"
          printf '%s\n' '---' 'name: ci-smoke' '---' 'Test skill for CI.' > .ci-skill/SKILL.md
          node "$GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" init
          node "$GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" add file:./.ci-skill
          node "$GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" list
          node "$GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" doctor --json > doctor.json
          node -e "const d=JSON.parse(require('fs').readFileSync('doctor.json','utf8')); if(!d.manifestPresent) process.exit(1); console.log('doctor ok:', d.status);"
          node "$GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" audit

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify publishable CLI artifact
        run: |
          test -f packages/cli/dist/index.js
          test -f packages/cli/bin/skillctl.js
          node packages/cli/bin/skillctl.js --version
          node --input-type=commonjs -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json','utf8'));
            if (pkg.name !== '@skillctl/cli') throw new Error('unexpected package name');
            if (!pkg.bin || !pkg.bin.skillctl) throw new Error('missing bin.skillctl');
            console.log('publish check ok:', pkg.name, Object.keys(pkg.bin));
          "

  windows-coexistence:
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
        coexist: [none, npx-hint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Coexistence smoke (${{ matrix.coexist }})
        shell: pwsh
        run: |
          $WORK = Join-Path $env:RUNNER_TEMP "skillctl-win-smoke"
          New-Item -ItemType Directory -Force -Path $WORK | Out-Null
          Set-Location $WORK
          if ("${{ matrix.coexist }}" -eq "npx-hint") {
            New-Item -ItemType Directory -Force -Path ".agents/skills" | Out-Null
            "{}" | Out-File "skills-lock.json" -Encoding utf8
          }
          New-Item -ItemType Directory -Force -Path "win-skill" | Out-Null
          "---`nname: win-ci-skill`n---`nWindows smoke." | Out-File "win-skill/SKILL.md" -Encoding utf8
          node "$env:GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" init
          node "$env:GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" add file:./win-skill
          node "$env:GITHUB_WORKSPACE/packages/cli/bin/skillctl.js" doctor --json | Out-File doctor.json
          $r = Get-Content doctor.json | ConvertFrom-Json
          Write-Host "doctor:" $r.status "coexistence:" $r.coexistence.detected