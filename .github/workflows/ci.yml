name: CI

on:
  push:
    branches: [main, 'execute-plan/*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm -r lint

      - name: Test (placeholder)
        run: pnpm test

      - name: Verify CLI (after build)
        run: |
          node packages/cli/bin/skillctl.js --version
          node packages/cli/bin/skillctl.js --help
          # Also test via pnpm filter + the exact bin entrypoint from package.json "bin" field
          # (exercises the declared shim; direct 'skillctl' name resolution requires global link)
          pnpm --filter @skillctl/cli exec -- node ./bin/skillctl.js --version
          pnpm --filter @skillctl/cli exec -- node ./bin/skillctl.js --help
